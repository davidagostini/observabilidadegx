services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.102.1
    command:
      - "--config=env:OTEL_CONFIG"
    environment:
      OTEL_CONFIG: |
        receivers:
          otlp:
            protocols:
              grpc:
              http:

        processors:
          batch:

        exporters:
          otlp/tempo:
            endpoint: tempo:4317
            tls:
              insecure: true

          prometheus:
            endpoint: "0.0.0.0:9464"

          logging:
            verbosity: detailed

        service:
          pipelines:
            traces:
              receivers: [otlp]
              processors: [batch]
              exporters: [otlp/tempo, logging]

            metrics:
              receivers: [otlp]
              processors: [batch]
              exporters: [prometheus, logging]

            logs:
              receivers: [otlp]
              processors: [batch]
              exporters: [logging]
    expose:
      - "4318"
    depends_on:
      - tempo

  tempo:
    image: grafana/tempo:2.5.0
    entrypoint:
      - /bin/sh
      - -c
    command:
      - |
        cat >/tmp/tempo.yaml <<'EOF'
        server:
          http_listen_port: 3200

        distributor:
          receivers:
            otlp:
              protocols:
                grpc:
                http:

        storage:
          trace:
            backend: local
            local:
              path: /tmp/tempo/traces
        EOF
        exec /tempo -config.file=/tmp/tempo.yaml
    expose:
      - "3200"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3200/ready"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  prometheus:
    image: prom/prometheus:v2.53.0
    entrypoint:
      - /bin/sh
      - -c
    command:
      - |
        cat >/tmp/prometheus.yml <<'EOF'
        global:
          scrape_interval: 15s

        scrape_configs:
          - job_name: otel-collector
            static_configs:
              - targets: ["otel-collector:9464"]
        EOF
        exec /bin/prometheus --config.file=/tmp/prometheus.yml
    expose:
      - "9090"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:9090/-/ready"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  grafana:
    image: grafana/grafana:13.0.1
    entrypoint:
      - /bin/sh
      - -c
    command:
      - |
        mkdir -p /etc/grafana/provisioning/datasources
        cat >/etc/grafana/provisioning/datasources/datasources.yml <<'EOF'
        apiVersion: 1

        datasources:
          - name: Prometheus
            type: prometheus
            access: proxy
            url: http://prometheus:9090
            isDefault: true

          - name: Tempo
            type: tempo
            access: proxy
            url: http://tempo:3200
        EOF
        exec /run.sh
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
    expose:
      - "3000"
    depends_on:
      - tempo
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  grafana_data:
