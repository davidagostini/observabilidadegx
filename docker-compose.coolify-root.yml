services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.102.1
    command:
      - "--config=/etc/otelcol-contrib/config.yaml"
    configs:
      - source: otel_collector_config
        target: /etc/otelcol-contrib/config.yaml
    expose:
      - "4318"
    depends_on:
      - tempo

  tempo:
    image: grafana/tempo:2.5.0
    command:
      - "-config.file=/etc/tempo/tempo.yaml"
    configs:
      - source: tempo_config
        target: /etc/tempo/tempo.yaml
    expose:
      - "3200"

  prometheus:
    image: prom/prometheus:v2.53.0
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    configs:
      - source: prometheus_config
        target: /etc/prometheus/prometheus.yml
    expose:
      - "9090"

  grafana:
    image: grafana/grafana:13.0.1
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
    configs:
      - source: grafana_datasources
        target: /etc/grafana/provisioning/datasources/datasources.yml
    expose:
      - "3000"
    depends_on:
      - tempo
      - prometheus

volumes:
  grafana_data:

configs:
  otel_collector_config:
    file: ./coolify/otelcol-config/config.yaml
  tempo_config:
    file: ./coolify/tempo-config/tempo.yaml
  prometheus_config:
    file: ./coolify/prometheus-config/prometheus.yml
  grafana_datasources:
    file: ./coolify/grafana-datasources/datasources.yml
